{{- if .Values.meetingApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "meeting-api") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.meetingApi.replicaCount }}
  {{- include "vexa.deploymentStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: meeting-api
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: meeting-api
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: meeting-api
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.meetingApi.image.repository }}:{{ .Values.global.imageTag | default .Values.meetingApi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: {{ include "vexa.dbHostEffective" . | quote }}
            - name: DB_PORT
              value: {{ include "vexa.dbPortEffective" . | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_USER
            - name: DB_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_PASSWORD
            - name: REDIS_URL
              value: {{ include "vexa.redisUrl" . | quote }}
            - name: REDIS_HOST
              value: {{ include "vexa.redisHost" . | quote }}
            - name: REDIS_PORT
              value: {{ include "vexa.redisPort" . | quote }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: ADMIN_API_TOKEN
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: INTERNAL_API_SECRET
            - name: RUNTIME_API_URL
              value: "http://{{ include "vexa.componentName" (list . "runtime-api") }}:{{ .Values.runtimeApi.service.port }}"
            - name: MEETING_API_URL
              value: "http://{{ include "vexa.componentName" (list . "meeting-api") }}:{{ .Values.meetingApi.service.port }}"
            - name: TRANSCRIPTION_COLLECTOR_URL
              value: "http://{{ include "vexa.componentName" (list . "meeting-api") }}:{{ .Values.meetingApi.service.port }}"
            - name: BOT_IMAGE_NAME
              value: {{ .Values.meetingApi.botImageName | default "vexaai/vexa-bot:latest" | quote }}
            {{- if .Values.ttsService.enabled }}
            - name: TTS_SERVICE_URL
              value: "http://{{ include "vexa.componentName" (list . "tts-service") }}:{{ .Values.ttsService.service.port }}"
            {{- end }}
            - name: TRANSCRIPTION_SERVICE_URL
              value: {{ .Values.meetingApi.transcriptionServiceUrl | default "" | quote }}
            - name: TRANSCRIPTION_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: TRANSCRIPTION_SERVICE_TOKEN
            # RoosterX audio-only fork — gates the transcript collector tasks
            # (meeting_api/config.py) and the per-meeting transcribe default
            # (meeting_api/meetings.py). Both default false: audio only.
            - name: TRANSCRIPTION_ENABLED
              value: {{ .Values.meetingApi.transcriptionEnabled | quote }}
            - name: TRANSCRIBE_DEFAULT
              value: {{ .Values.meetingApi.transcribeDefault | quote }}
            - name: RECORDING_ENABLED
              value: {{ required "meetingApi.recordingEnabled must be set" .Values.meetingApi.recordingEnabled | quote }}
            - name: STORAGE_BACKEND
              value: {{ .Values.meetingApi.storageBackend | default "minio" | quote }}
            # RoosterX audio-only fork — S3/R2 storage env. Read by
            # meeting_api/storage.py only when STORAGE_BACKEND=s3. Empty
            # defaults are harmless under the default minio backend.
            - name: S3_ENDPOINT
              value: {{ .Values.meetingApi.s3Endpoint | default "" | quote }}
            - name: S3_BUCKET
              value: {{ .Values.meetingApi.s3Bucket | default "" | quote }}
            - name: S3_SECURE
              value: {{ .Values.meetingApi.s3Secure | default "true" | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.meetingApi.awsAccessKeyId | default "" | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.meetingApi.awsSecretAccessKey | default "" | quote }}
            - name: AWS_REGION
              value: {{ .Values.meetingApi.awsRegion | default "auto" | quote }}
            {{- if .Values.minio.enabled }}
            - name: MINIO_ENDPOINT
              value: "{{ include "vexa.componentName" (list . "minio") }}:{{ .Values.minio.service.port }}"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            {{- else }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.meetingApi.minioEndpoint | default "" | quote }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.meetingApi.minioAccessKey | default "" | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.meetingApi.minioSecretKey | default "" | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.meetingApi.minioBucket | default "vexa" | quote }}
            {{- end }}
            - name: MINIO_SECURE
              value: {{ .Values.meetingApi.minioSecure | default "false" | quote }}
            # v0.10.5.3 Pack D-3 follow-up (Option B): MINIO_PUBLIC_ENDPOINT
            # is the browser-reachable hostname used to sign download URLs.
            # MINIO_ENDPOINT (above) stays in-cluster for fast server-side I/O.
            # When unset/empty, storage.py falls back to MINIO_ENDPOINT.
            # Set this when MinIO Service.type=NodePort and you have an
            # external IP, OR when an ingress fronts MinIO under an FQDN.
            - name: MINIO_PUBLIC_ENDPOINT
              value: {{ .Values.meetingApi.minioPublicEndpoint | default "" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.meetingApi.logLevel | default "INFO" | quote }}
            {{- with .Values.meetingApi.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # v0.10.5 Pack C.4 — readinessProbe gated on consumer-up.
          # /readyz returns 503 until startup_complete (Redis ping
          # succeeded AND xgroup_create succeeded AND consumer tasks
          # alive). K8s Service routes traffic only to Ready pods, so
          # a pod with no working consumer never receives traffic.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # /health = HTTP-loop liveness (always 200 unless event loop wedges)
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            {{- toYaml .Values.meetingApi.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
